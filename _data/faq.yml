- question: "Where is Casa Seda located?"
  answer: "Casa Seda is nestled in the heart of Bali, offering an intimate and conveniently accessible location for fine dining."

- question: "What type of cuisine does Casa Seda serve?"
  answer: "We offer a unique fusion of Spanish warmth and Asian calm, featuring expertly prepared seafood, imaginative plant-based dishes, and fresh, seasonal ingredients."

- question: "Do you offer vegetarian or plant-based options?"
  answer: "Yes, our dinner and lunch menus feature a variety of imaginative plant-based dishes crafted from the finest seasonal ingredients."

- question: "What is the atmosphere like at Casa Seda?"
  answer: "The ambiance is a seamless blend of refined elegance and cozy warmth, featuring natural woods, soft lighting, plush seating, and touches of bamboo and silk."

- question: "How can I make a reservation?"
  answer: "You can book a table directly through our online reservation portal linked on our website."

- question: "Do you have a lunch menu?"
  answer: "Yes, our lunch menu offers a delightful selection of dishes that balance lightness and flavor, perfect for a midday escape."

- question: "What kind of drinks are available?"
  answer: "Our beverage selection includes a curated list of fine wines, creative cocktails, and vibrant, refreshing non-alcoholic options."
